name: Auto_Post
on:
  schedule:
    # 1. รอบเช้า (เป้า 08:00 ไทย) -> ตื่น 07:00 ไทย
    # สูตร: 07:00 - 7 = 00:00 UTC
    - cron: '0 0 * * *'
    
    # 2. รอบบ่าย (เป้า 12:00 ไทย) -> ตื่น 11:00 ไทย
    # สูตร: 11:00 - 7 = 04:00 UTC
    - cron: '0 4 * * *'
    
    # 3. รอบเย็น (เป้า 17:00 ไทย) -> ตื่น 16:00 ไทย
    # สูตร: 16:00 - 7 = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - bot: greenhaven
            prefix: GH
          - bot: moonchill
            prefix: MC
          - bot: stray_cat_1
            prefix: SC1
          - bot: stray_cat_2
            prefix: SC2
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - run: pip install tweepy
      
      - name: Run Auto-Posting Script
        env:
          PYTHONUNBUFFERED: 1
          CONSUMER_KEY: ${{ secrets[format('{0}_CONSUMER_KEY', matrix.prefix)] }}
          CONSUMER_SECRET: ${{ secrets[format('{0}_CONSUMER_SECRET', matrix.prefix)] }}
          X_ACCESS_TOKEN: ${{ secrets[format('{0}_X_ACCESS_TOKEN', matrix.prefix)] }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets[format('{0}_X_ACCESS_TOKEN_SECRET', matrix.prefix)] }}
        run: python -m src.main --bot ${{ matrix.bot }} --mode auto
